      - role: system
        content: ${system}
      - role: user
        content: Use the city_lookup tool with countryCode 'US' and tell me the result.
      - role: assistant
        content: I'll call the city_lookup tool with the country code 'US' for you.
      - role: assistant
        tool_calls:
          - id: toolcall_0
            type: function
            function:
              name: report_intent
              arguments: '{"intent":"Looking up city information"}'
      - role: assistant
        tool_calls:
          - id: toolcall_1
            type: function
            function:
              name: city_lookup
              arguments: '{"countryCode":"US"}'
