models:
  - claude-sonnet-4.5
conversations:
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Use the magic_number tool with seed 'hello' and tell me the result
      - role: assistant
        content: I'll use the magic_number tool with seed 'hello' for you.
      - role: assistant
        tool_calls:
          - id: toolcall_0
            type: function
            function:
              name: report_intent
              arguments: '{"intent":"Getting magic number"}'
      - role: assistant
        tool_calls:
          - id: toolcall_1
            type: function
            function:
              name: magic_number
              arguments: '{"seed":"hello"}'
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Use the magic_number tool with seed 'hello' and tell me the result
      - role: assistant
        content: I'll use the magic_number tool with seed 'hello' for you.
        tool_calls:
          - id: toolcall_0
            type: function
            function:
              name: report_intent
              arguments: '{"intent":"Getting magic number"}'
          - id: toolcall_1
            type: function
            function:
              name: magic_number
              arguments: '{"seed":"hello"}'
      - role: tool
        tool_call_id: toolcall_0
        content: Intent logged
      - role: tool
        tool_call_id: toolcall_1
        content: MAGIC_hello_42
      - role: assistant
        content: The magic number for seed 'hello' is **MAGIC_hello_42**.
