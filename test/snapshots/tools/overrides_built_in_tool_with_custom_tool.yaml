models:
  - claude-sonnet-4.5
conversations:
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Use grep to search for the word 'hello'
      - role: assistant
        content: I'll search for the word 'hello' in the current directory.
      - role: assistant
        tool_calls:
          - id: toolcall_0
            type: function
            function:
              name: report_intent
              arguments: "{\"intent\":\"Searching for 'hello'\"}"
      - role: assistant
        tool_calls:
          - id: toolcall_1
            type: function
            function:
              name: grep
              arguments: '{"query":"hello"}'
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Use grep to search for the word 'hello'
      - role: assistant
        content: I'll search for the word 'hello' in the current directory.
        tool_calls:
          - id: toolcall_0
            type: function
            function:
              name: report_intent
              arguments: "{\"intent\":\"Searching for 'hello'\"}"
          - id: toolcall_1
            type: function
            function:
              name: grep
              arguments: '{"query":"hello"}'
      - role: tool
        tool_call_id: toolcall_0
        content: Intent logged
      - role: tool
        tool_call_id: toolcall_1
        content: "CUSTOM_GREP_RESULT: hello"
      - role: assistant
        content: 'The grep search found a result for "hello" in the current directory. The output shows `CUSTOM_GREP_RESULT:
          hello`, indicating the custom grep implementation found a match.'
